name: ShellCheck

on:
  push:
    branches: [main]
    paths: ['*.sh']
  pull_request:
    branches: [main]
    paths: ['*.sh']

jobs:
  shellcheck:
    name: Lint shell scripts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install ShellCheck
        run: sudo apt-get install -y shellcheck

      - name: Run ShellCheck on setup.sh
        run: shellcheck -x -s bash -S warning setup.sh

      - name: Run ShellCheck on cleanup.sh
        run: shellcheck -x -s bash -S warning cleanup.sh

      - name: Run ShellCheck on check.sh
        run: shellcheck -x -s bash -S warning check.sh

      - name: Syntax check
        run: |
          bash -n setup.sh
          bash -n cleanup.sh
          bash -n check.sh
